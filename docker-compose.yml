services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vscan-backend
    restart: unless-stopped
    volumes:
      - vscan-data:/app/data
    environment:
      - GIN_MODE=release
    networks:
      - vscan-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vscan-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - vscan-network

  cli:
    build:
      context: .
      dockerfile: Dockerfile.cli
    profiles: ["cli"]
    entrypoint: ["vscan"]

volumes:
  vscan-data:

networks:
  vscan-network:
    driver: bridge
